repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: ["--follow-imports=skip", "--ignore-missing-imports", "--disable-error-code=no-any-return", "--disable-error-code=no-untyped-def", "--disable-error-code=misc", "--disable-error-code=type-arg"]
        additional_dependencies: ["types-PyYAML==6.0.12.20240917"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-q", "-r", "cryptography_suite", "-x", "tests,docs,examples"]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest branch coverage gate
        entry: pytest --cov=cryptography_suite --cov-branch --cov-report=term-missing --cov-fail-under=95
        language: system
        pass_filenames: false
