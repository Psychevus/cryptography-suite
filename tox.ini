[tox]
envlist = py311, legacy
minversion = 4.0
isolated_build = true
skip_missing_interpreters = true

[testenv]
extras = dev
commands =
    coverage run --rcfile=.coveragerc -m pytest -p no:cov cryptography_suite tests
    coverage xml --fail-under=0
    coverage json
    python tools/check_coverage_thresholds.py
    python -c "import xml.etree.ElementTree as ET, sys; root=ET.parse('coverage.xml').getroot(); sys.exit(0 if float(root.attrib['line-rate']) >= 0.95 else 1)"

[testenv:legacy]
extras = dev,legacy
