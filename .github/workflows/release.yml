name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  validate-release:
    name: Validate tag, changelog, and quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Enforce SemVer tag
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]

      - name: Ensure changelog contains release entry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          rg "^## \[$VERSION\]" CHANGELOG.md

      - name: Detect Python files changed since previous tag
        id: changed-python
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            FILES=$(git ls-files '*.py' '*.pyi')
          else
            FILES=$(git diff --name-only "$PREV_TAG".."$GITHUB_SHA" -- '*.py' '*.pyi')
          fi
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$FILES" ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate formatting (ruff, changed files)
        if: steps.changed-python.outputs.any_changed == 'true'
        run: |
          echo "${{ steps.changed-python.outputs.files }}" | xargs -r ruff format --check

      - name: Validate formatting (black, changed files)
        if: steps.changed-python.outputs.any_changed == 'true'
        run: |
          echo "${{ steps.changed-python.outputs.files }}" | xargs -r black --check

      - name: Run quality gate checks
        run: |
          if [ "${{ steps.changed-python.outputs.any_changed }}" = "true" ]; then
            echo "${{ steps.changed-python.outputs.files }}" | xargs -r ruff check
            echo "${{ steps.changed-python.outputs.files }}" | xargs -r mypy --follow-imports=skip --ignore-missing-imports --disable-error-code=no-any-return --disable-error-code=no-untyped-def --disable-error-code=misc --disable-error-code=type-arg
          fi
          bandit -q -r cryptography_suite -x tests,docs,examples -s B101,B110,B301,B311,B403,B404,B413,B603,B701
          pip-audit -r requirements.txt --strict
          pytest --ignore=tests/generated --cov=cryptography_suite --cov-branch

  build-and-publish:
    name: Build and publish release artifacts
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-release.txt

      - name: Install locked build dependencies
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements-release.txt

      - name: Build reproducible artifacts
        run: python tools/reproducible_build.py

      - name: Generate changelog notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \[$VERSION\]/ {flag=1; next} /^## \[/ {flag=0} flag" CHANGELOG.md > notes.txt
          test -s notes.txt

      - name: Generate SBOM
        run: python tools/generate_sbom.py

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign release artifacts with Sigstore keyless
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for artifact in dist/*.whl dist/*.tar.gz; do
            cosign sign-blob \
              --output-signature "${artifact}.sig" \
              --output-certificate "${artifact}.cert" \
              "$artifact"
          done

      - name: Generate SLSA-style provenance attestations
        env:
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          : > dist/provenance.intoto.jsonl
          for artifact in dist/*.whl dist/*.tar.gz; do
            digest=$(sha256sum "$artifact" | awk '{print $1}')
            predicate_file=$(mktemp)
            cat > "$predicate_file" <<EOF
          {
            "_type": "https://slsa.dev/provenance/v1",
            "subject": [
              {
                "name": "$(basename "$artifact")",
                "digest": {"sha256": "$digest"}
              }
            ],
            "predicateType": "https://slsa.dev/provenance/v1",
            "predicate": {
              "buildDefinition": {
                "buildType": "https://github.com/Attestations/GitHubActionsWorkflow@v1",
                "externalParameters": {
                  "workflow": "$GITHUB_WORKFLOW_REF"
                },
                "internalParameters": {
                  "runId": "$GITHUB_RUN_ID",
                  "runAttempt": "$GITHUB_RUN_ATTEMPT"
                },
                "resolvedDependencies": [
                  {
                    "uri": "git+https://github.com/${{ github.repository }}@${GITHUB_SHA}",
                    "digest": {"sha1": "$GITHUB_SHA"}
                  }
                ]
              },
              "runDetails": {
                "builder": {
                  "id": "https://github.com/${{ github.repository }}/.github/workflows/release.yml"
                },
                "metadata": {
                  "invocationId": "https://github.com/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
                }
              }
            }
          }
          EOF
            cosign attest-blob \
              --type slsaprovenance \
              --predicate "$predicate_file" \
              --output-attestation "${artifact}.intoto.jsonl" \
              "$artifact"
            cat "${artifact}.intoto.jsonl" >> dist/provenance.intoto.jsonl
            rm -f "$predicate_file"
          done

      - name: Sign provenance bundle
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --output-signature dist/provenance.intoto.jsonl.sig \
            --output-certificate dist/provenance.intoto.jsonl.cert \
            dist/provenance.intoto.jsonl

      - name: Sign SBOM
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --output-signature dist/sbom.json.sig \
            --output-certificate dist/sbom.json.cert \
            dist/sbom.json

      - name: Lint release artifacts
        run: python tools/release_lint.py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.txt
          files: |
            dist/*
