name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  validate-release:
    name: Validate tag, changelog, and quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Enforce SemVer tag
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]

      - name: Ensure changelog contains release entry
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          rg "^## \[$VERSION\]" CHANGELOG.md

      - name: Detect Python files changed since previous tag
        id: changed-python
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            FILES=$(git ls-files '*.py' '*.pyi')
          else
            FILES=$(git diff --name-only "$PREV_TAG".."$GITHUB_SHA" -- '*.py' '*.pyi')
          fi
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$FILES" ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate formatting (ruff, changed files)
        if: steps.changed-python.outputs.any_changed == 'true'
        run: |
          echo "${{ steps.changed-python.outputs.files }}" | xargs -r ruff format --check

      - name: Validate formatting (black, changed files)
        if: steps.changed-python.outputs.any_changed == 'true'
        run: |
          echo "${{ steps.changed-python.outputs.files }}" | xargs -r black --check

      - name: Run quality gate checks
        run: |
          if [ "${{ steps.changed-python.outputs.any_changed }}" = "true" ]; then
            echo "${{ steps.changed-python.outputs.files }}" | xargs -r ruff check
            echo "${{ steps.changed-python.outputs.files }}" | xargs -r mypy --follow-imports=skip --ignore-missing-imports --disable-error-code=no-any-return --disable-error-code=no-untyped-def --disable-error-code=misc --disable-error-code=type-arg
          fi
          bandit -q -r cryptography_suite -x tests,docs,examples
          pip-audit -r requirements.txt --strict
          pytest --cov=cryptography_suite --cov-branch --cov-fail-under=95

  build-and-publish:
    name: Build and publish release artifacts
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-release.txt

      - name: Install locked build dependencies
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements-release.txt

      - name: Build reproducible artifacts
        run: python tools/reproducible_build.py

      - name: Generate changelog notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \[$VERSION\]/ {flag=1; next} /^## \[/ {flag=0} flag" CHANGELOG.md > notes.txt
          test -s notes.txt

      - name: Generate SBOM
        run: python tools/generate_sbom.py

      - name: Lint release artifacts
        run: python tools/release_lint.py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.txt
          files: |
            dist/*
