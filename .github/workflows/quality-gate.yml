name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Formatting, Lint, Type, Security, Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Validate formatting (ruff)
        run: ruff format --check .

      - name: Validate formatting (black)
        run: black --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type checks (mypy)
        run: mypy cryptography_suite tools

      - name: Security scan (bandit)
        run: bandit -q -r cryptography_suite -x tests,docs,examples

      - name: Dependency vulnerabilities (pip-audit)
        run: pip-audit -r requirements.txt --strict

      - name: Tests with branch coverage gate
        run: pytest --cov=cryptography_suite --cov-branch --cov-report=xml --cov-report=term-missing --cov-fail-under=95

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
