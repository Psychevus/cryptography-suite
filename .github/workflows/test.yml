name: Test Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests with branch coverage
        run: coverage run --rcfile=.coveragerc -m pytest -p no:cov cryptography_suite tests
      - name: Coverage gate
        run: |
          coverage xml --fail-under=0
          coverage json
          python tools/check_coverage_thresholds.py
          python - <<'PY'
          import xml.etree.ElementTree as ET, sys
          rate = float(ET.parse('coverage.xml').getroot().attrib['line-rate'])
          sys.exit(0 if rate >= 0.95 else 1)
          PY
      - name: Generate HTML coverage report
        run: coverage html
      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
